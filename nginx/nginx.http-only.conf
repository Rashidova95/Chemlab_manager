# 1-BOSQICH: sertifikat olishdan OLDIN ishlatiladigan konfiguratsiya.
# Faqat HTTP (80-port) — Certbot domenni tasdiqlashi (ACME challenge) uchun kerak.
# Sertifikat olingandan keyin bu faylni nginx.ssl.conf bilan almashtirasiz.

server {
    listen 80;
    server_name api.sizning-domeningiz.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
