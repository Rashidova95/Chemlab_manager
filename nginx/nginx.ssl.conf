# 2-BOSQICH: sertifikat olingandan KEYIN ishlatiladigan konfiguratsiya.
# nginx.http-only.conf o'rniga shu faylni ishlating (README'ga qarang).

server {
    listen 80;
    server_name api.sizning-domeningiz.uz;

    # Certbot sertifikatni har 90 kunda yangilashi uchun bu yo'l doim ochiq turishi kerak
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Qolgan barcha HTTP so'rovlar HTTPS'ga yo'naltiriladi
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.sizning-domeningiz.uz;

    ssl_certificate     /etc/letsencrypt/live/api.sizning-domeningiz.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sizning-domeningiz.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
